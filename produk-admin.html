<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detail Pengajuan Vendor</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    background:#f5f0e8;
}

.container{
    max-width:1000px;
    margin:30px auto;
    background:#fff;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 3px 12px rgba(0,0,0,.1);
}

/* HEADER */
.detail-header{
    background:#4a3d3d;
    padding:20px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.header-left{
    display:flex;
    align-items:center;
    gap:15px;
}

.back-btn{
    width:40px;
    height:40px;
    border-radius:50%;
    background:rgba(255,255,255,.15);
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    text-decoration:none;
    font-size:22px;
}

.title-area h2{
    color:#fff;
    font-size:24px;
}

.title-area p{
    color:#d7d7d7;
    font-size:13px;
}

.status-badge{
    background:#fff3d4;
    color:#d89000;
    padding:7px 15px;
    border-radius:20px;
    font-size:13px;
    font-weight:600;
}

/* STEPPER */
.stepper{
    background:#4a3d3d;
    padding:0 30px 20px;
    display:flex;
    align-items:center;
}

.step{
    display:flex;
    align-items:center;
    gap:8px;
}

.step span{
    width:30px;
    height:30px;
    border-radius:50%;
    background:#6f6363;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:13px;
}

.step.active span{
    background:#f0a318;
}

.step p{
    color:#ddd;
    font-size:14px;
}

.step.active p{
    color:#f0a318;
}

.line{
    flex:1;
    height:2px;
    background:#6f6363;
    margin:0 10px;
}

/* CONTENT */
.content{
    padding:30px;
}

.section-title{
    font-size:14px;
    color:#888;
    margin-bottom:20px;
    font-weight:600;
}

.form-grid{
    display:grid;
    grid-template-columns:1fr;
    gap:20px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

.form-group label{
    margin-bottom:8px;
    color:#666;
    font-size:14px;
}

.form-group label span{
    color:#f0a318;
}

.form-group input,
.form-group textarea,
.form-group select{
    width:100%;
    border:1px solid #ddd;
    border-radius:10px;
    padding:14px;
    font-size:14px;
    background:#fff;
}

.form-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

textarea{
    resize:none;
    min-height:90px;
}

/* FOOTER BUTTON */
.footer-btn{
    border-top:1px solid #eee;
    padding:25px 30px;
    display:flex;
    justify-content:space-between;
}

.btn{
    border:none;
    border-radius:10px;
    padding:14px 30px;
    cursor:pointer;
    font-size:15px;
}

.btn-back{
    background:#efebe5;
    color:#555;
}

.btn-next{
    background:#f0a318;
    color:white;
}

.btn-next:hover{
    background:#de9400;
}

/* RESPONSIVE */
@media(max-width:768px){

.form-row{
    grid-template-columns:1fr;
}

.step p{
    display:none;
}

.detail-header{
    flex-direction:column;
    gap:15px;
    align-items:flex-start;
}

.footer-btn{
    flex-direction:column;
    gap:10px;
}

.btn{
    width:100%;
}
}
.summary-box{
    margin-top:20px;
    border:1px solid #e8e2d8;
    background:#faf8f5;
    border-radius:12px;
    padding:20px;
}

.summary-box h4{
    color:#999;
    font-size:12px;
    margin-bottom:15px;
    text-transform:uppercase;
}

.summary-row{
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
}

.summary-row:last-child{
    margin-bottom:0;
}

.summary-row span{
    color:#777;
}

.summary-row strong{
    color:#333;
}
.step.done span{
    background:#f0a318;
    color:#fff;
}
.upload-preview{
    border:1px solid #f0c27a;
    background:#fff9f0;
    border-radius:12px;
    padding:15px;
    display:flex;
    align-items:center;
    position:relative;
    gap:15px;
}

.file-icon{
    width:60px;
    height:60px;
    border:1px solid #e5e5e5;
    border-radius:10px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
    background:#fff;
}

.file-info{
    flex:1;
    display:flex;
    flex-direction:column;
}

.file-info strong{
    font-size:14px;
    color:#444;
}

.file-info small{
    color:#999;
    margin:4px 0 8px;
}

.lihat-btn{
    width:70px;
    border:none;
    background:#f0a318;
    color:#fff;
    padding:7px 0;
    border-radius:6px;
    cursor:pointer;
    font-size:13px;
}

.lihat-btn:hover{
    background:#d98f00;
}

.file-type{
    position:absolute;
    left:48px;
    bottom:12px;
    background:#666;
    color:#fff;
    font-size:10px;
    padding:2px 8px;
    border-radius:10px;
}

.upload-note{
    text-align:center;
    color:#b3b3b3;
    font-size:12px;
    margin-top:8px;
}

select:disabled,
input:read-only,
textarea:read-only{
    background:#fff;
    color:#333;
}
</style>

</head>

    <!-- STEPPER -->
<div class="stepper">

    <!-- BUTTON -->
